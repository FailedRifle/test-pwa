<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link href="//netdna.bootstrapcdn.com/bootstrap/3.1.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="//fonts.googleapis.com/css?family=Roboto:400,100,700,900" rel="stylesheet" type="text/css">
  
  <link href="./blocked.png" rel="icon" type="image/png">
  <link id="pwa-manifest" rel="manifest" href="./manifest.json">
  
  <meta name="theme-color" content="#000000">
  <style>
    @supports (font: -apple-system-body) { html { font: -apple-system-body; } }
    html { height: 100%; overflow: hidden; }
    body { margin: 0; padding: 0; background-color: #3E3E3E; background: radial-gradient(ellipse at center, #707070 13%, #333333 100%); font-family: 'Roboto', sans-serif; height: 100vh; }
    .outer { display: table; position: absolute; height: 100%; width: 100%; }
    .middle { display: table-cell; vertical-align: middle; }
    .content {
      max-width: 32em; padding: 0 1.25em; margin: 1.875em auto;
      color: #c7c7c7; text-align: center; font-size: 1.72em; font-weight: 100;
      height: 22em; background-repeat: no-repeat; background-size: 32%;
      background-position: center center;
      background-image: url('./blocked.png');
    }
    .content h1 { color: #00AAD7; font-size: 2.5em; margin: 0; margin-bottom: -20px; }
    iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: none; display: none; }
  </style>
</head>
<body>

  <div id="browser-block" style="display:none;">
    <div class="outer">
      <div class="middle" aria-label="" title="cheddar noooooooooo">
        <div class="content">
          <h1><strong>RESTRICTED!</strong></h1>
          <br />
          This website has been blocked by Cheddar Hobbs.
        </div>
      </div>
    </div>
  </div>

  <iframe id="app-frame"></iframe>

<script>
  const isInstallable = true;
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

  // Handle Non-PWA view
  if (!isPWA) {
    document.title = 'RESTRICTED!';
    document.getElementById('browser-block').style.display = 'block';
  } else {
    const blockScreen = document.getElementById('browser-block');
    const contentDiv = blockScreen.querySelector('.content');
    
    document.body.style.background = "#1a1a1a";
    contentDiv.style.backgroundImage = "none";
    contentDiv.innerHTML = `
      <h1><strong>LAUNCHING...</strong></h1>
      <br />The window will open in 5 seconds. v1
      <p style="font-size: 0.6em; margin-top: 20px; color: #888;">(Tap anywhere to ensure it opens)</p>
    `;
    blockScreen.style.display = 'block';

    setTimeout(function() {
        const newWindow = window.open('', '_blank', 'width=300,height=200');

        if (newWindow) {
            newWindow.document.write('<style>body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;margin:0;font-family:sans-serif;}</style>');
            newWindow.document.write('<h1>Hi</h1>');
            newWindow.document.close();

            contentDiv.innerHTML = `<h1><strong>ACTIVE</strong></h1><br />Check the secondary window.`;
        } else {
            contentDiv.innerHTML = `
              <h1 style="color: #ff4444;"><strong>BLOCKED</strong></h1>
              <br />Please enable pop-ups in your settings and restart the app.
            `;
        }
    }, 5000);
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(err => console.error('SW failed'));
    });
  }
</script>
</body>
</html>
