<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <link href="//netdna.bootstrapcdn.com/bootstrap/3.1.0/css/bootstrap.min.css" rel="stylesheet">
  <link href="//fonts.googleapis.com/css?family=Roboto:400,100,700,900" rel="stylesheet" type="text/css">
  <link href="./blocked.png" rel="icon" type="image/png">
  <link id="pwa-manifest" rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#000000">
  <style>
    html { height: 100%; overflow: hidden; }
    body { margin: 0; padding: 0; background-color: #3E3E3E; background: radial-gradient(ellipse at center, #707070 13%, #333333 100%); font-family: 'Roboto', sans-serif; height: 100vh; }
    .outer { display: table; position: absolute; height: 100%; width: 100%; }
    .middle { display: table-cell; vertical-align: middle; }
    .content {
      max-width: 32em; padding: 0 1.25em; margin: 1.875em auto;
      color: #c7c7c7; text-align: center; font-size: 1.72em; font-weight: 100;
      height: 22em; background-repeat: no-repeat; background-size: 32%;
      background-position: center center;
      background-image: url('./blocked.png');
    }
    .content h1 { color: #00AAD7; font-size: 2.5em; margin-bottom: -10px; }
    #install-btn { 
      margin-top: 20px; padding: 10px 25px; font-size: 0.6em; 
      background: #00AAD7; border: none; color: white; border-radius: 5px;
      cursor: pointer; display: none; font-weight: 700;
    }
    #install-btn:hover { background: #008cb1; }
  </style>
</head>
<body>

  <div id="browser-block">
    <div class="outer">
      <div class="middle">
        <div class="content">
          <div id="status-area">
            <h1><strong>RESTRICTED!</strong></h1>
            <br />
            This website has been blocked by Cheddar Hobbs.
            <br />
            <button id="install-btn">INSTALL APP TO ACCESS</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
  const isInstallable = true;
  const isPWA = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  const installBtn = document.getElementById('install-btn');
  let deferredPrompt;

  // 1. Core function to handle the injection
  async function runInjection() {
    let baseHref = 'https://cdn.jsdelivr.net/gh/failedrifle/hamburger@main/core/library/';
    let htmlContent = '';

    // Try to get the latest SHA first
    try {
      const apiRes = await fetch('https://api.github.com/repos/failedrifle/hamburger/commits/main');
      const data = await apiRes.json();
      if (data.sha) baseHref = `https://cdn.jsdelivr.net/gh/failedrifle/hamburger@${data.sha}/core/library/`;
    } catch (e) { console.log("SHA fetch failed, using main branch"); }

    // Fetch the actual HTML content BEFORE opening the window
    try {
      const pageRes = await fetch(baseHref + 'index.html');
      htmlContent = await pageRes.text();
    } catch (e) {
      // If fetch fails, just redirect the main window as a fallback
      window.location.href = 'https://failedrifle.github.io/hamburger/core/library/index.html';
      return;
    }

    // Now open the window and inject the pre-fetched content
    const newWin = window.open('', '_blank', 'width=900,height=550,menubar=no,status=no,location=no');
    
    if (newWin) {
      newWin.document.open();
      // Inject the base tag so assets load, then the HTML
      newWin.document.write(`<base href="${baseHref}">` + htmlContent);
      newWin.document.close();

      // Close the "Restricted" shell
      window.open('', '_self', ''); 
      window.close();
    }
  }

  // PWA Install Logic
  if (isInstallable && !isPWA) {
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-block';
    });

    installBtn.addEventListener('click', async () => {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') installBtn.style.display = 'none';
        deferredPrompt = null;
      }
    });
  }

  // Execution
  if (isPWA) {
    runInjection();
  }

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./service-worker.js').catch(err => {});
    });
  }
</script>
</body>
</html>
